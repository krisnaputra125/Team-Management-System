                            {showCertManager && (
                                <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[130] flex items-center justify-center fade-in p-4">
                                    <div className="bg-white dark:bg-slate-900 rounded-3xl shadow-2xl w-full max-w-md flex flex-col max-h-[80vh] overflow-hidden transform scale-in border border-slate-200 dark:border-slate-800">
                                        <div className="flex justify-between items-center p-5 border-b border-slate-100 dark:border-slate-700/50 bg-slate-50/50 dark:bg-slate-900/50">
                                            <h3 className="text-xl font-bold text-slate-800 dark:text-slate-100 flex items-center gap-2"><Icon name="settings" size={20} className="text-slate-400" /> Kelola Daftar Sertifikat</h3>
                                            <button onClick={() => setShowCertManager(false)} type="button" className="text-slate-400 hover:bg-slate-200 hover:text-slate-600 dark:hover:bg-slate-700 dark:hover:text-slate-300 p-2 rounded-xl transition-colors"><Icon name="x" size={20} /></button>
                                        </div>
                                        <div className="p-6 overflow-y-auto custom-scrollbar flex-1">
                                            <form onSubmit={(e) => {
                                                e.preventDefault();
                                                const input = e.target.elements.newcert.value.trim();
                                                if (!input) return;
                                                if (certList.includes(input)) {
                                                    setAlertModal({ isOpen: true, title: 'Duplikasi Sertifikat', message: "Sertifikat sudah ada di dalam daftar!" });
                                                    return;
                                                }
                                                handleUpdateCertList([input, ...certList]);
                                                e.target.reset();
                                            }} className="flex gap-2 mb-4">
                                                <input type="text" name="newcert" placeholder="Tambah nama sertifikat baru..." className="flex-1 p-2 border border-slate-300 dark:border-slate-700 rounded-lg outline-none focus:border-indigo-500 bg-slate-50 dark:bg-slate-800 text-sm dark:text-slate-200" />
                                                <button type="submit" className="px-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg text-sm font-semibold transition-colors flex items-center gap-1"><Icon name="plus" size={16} /> Tambah</button>
                                            </form>
                                            <div className="space-y-2">
                                                {certList.length === 0 ? <p className="text-sm text-slate-400 italic">Daftar kosong.</p> : null}
                                                {certList.map((cert, idx) => (
                                                    <div key={idx} className="flex justify-between items-center p-2.5 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg">
                                                        <span className="text-sm text-slate-700 dark:text-slate-300">{cert}</span>
                                                        <button onClick={() => {
                                                            if (confirm(`Hapus ${cert} dari daftar sertifikat?`)) {
                                                                handleUpdateCertList(certList.filter(item => item !== cert));
                                                            }
                                                        }} className="text-slate-400 hover:text-red-500 transition-colors p-1" title="Hapus"><Icon name="trash-2" size={16} /></button>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                                        <div className="w-16 h-16 bg-red-100 dark:bg-red-900/30 text-red-600 dark:text-red-400 rounded-full flex items-center justify-center mx-auto mb-4">
                                            <Icon name="alert-triangle" size={32} />
                                        </div>
                                        <h3 className="text-lg font-bold text-slate-800 dark:text-slate-100 mb-2">{alertModal.title}</h3>
                                        <p className="text-sm text-slate-600 dark:text-slate-400 mb-6 whitespace-pre-line">{alertModal.message}</p>
                                        <button onClick={() => setAlertModal({ isOpen: false, title: '', message: '' })} className="w-full px-4 py-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-semibold transition-colors">
                                            Mengerti
                                        </button>
                                    </div>
                                </div>
                            )}

                                <BottomNavItem icon={<Icon name="layout-dashboard" size={22} />} label="Beranda" isActive={activeTab === 'dashboard'} onClick={() => handleTabChange('dashboard')} />
                                <BottomNavItem icon={<Icon name="briefcase" size={22} />} label="Proyek" isActive={activeTab === 'proyek'} onClick={() => handleTabChange('proyek')} />
                                <BottomNavItem icon={<Icon name="users" size={22} />} label="Tim" isActive={activeTab === 'tim'} onClick={() => handleTabChange('tim')} />
                                <BottomNavItem icon={<Icon name="award" size={22} />} label="Ahli" isActive={activeTab === 'ahli'} onClick={() => handleTabChange('ahli')} />
                                <BottomNavItem icon={<Icon name="briefcase" size={22} />} label="Tugas" isActive={activeTab === 'penugasan'} onClick={() => handleTabChange('penugasan')} />
                                <BottomNavItem icon={<Icon name="calendar" size={22} />} label="Ploting" isActive={activeTab === 'gantt'} onClick={() => handleTabChange('gantt')} />
                                <BottomNavItem icon={<Icon name="box" size={22} />} label="Inventaris" isActive={activeTab === 'inventaris'} onClick={() => handleTabChange('inventaris')} />
                                <BottomNavItem icon={<Icon name="bar-chart" size={22} />} label="KPI" isActive={activeTab === 'kpi'} onClick={() => handleTabChange('kpi')} />
                            </nav>
                        </div>
                    </div>
                </>
            );
        }

        function SidebarItem({ icon, label, isActive, onClick }) {
            return (
                <button onClick={onClick} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 font-semibold ${isActive ? 'bg-indigo-600 text-white shadow-md shadow-indigo-900/20' : 'text-slate-500 dark:text-slate-400 hover:bg-white/60 dark:hover:bg-slate-800 hover:text-slate-800 dark:hover:text-slate-200'}`}>
                    {icon} <span className="font-medium text-sm">{label}</span>
                </button>
            );
        }

        function BottomNavItem({ icon, label, isActive, onClick }) {
            return (
                <button onClick={onClick} className={`flex flex-col items-center justify-center w-full h-full gap-1 transition-colors ${isActive ? 'text-blue-600 dark:text-blue-400' : 'text-slate-400 hover:text-slate-500 dark:hover:text-slate-300'}`}>
                    <div className={`transition-transform duration-200 ${isActive ? 'scale-110' : 'scale-100'}`}>{icon}</div>
                    <span className="text-[10px] font-bold">{label}</span>
                </button>
            );
        }

        function MetricCard({ title, value, trend, trendUp, icon, color, onClick }) {
            const darkColorMap = {
                'bg-blue-50': 'dark:bg-blue-900/20 dark:text-blue-400',
                'bg-indigo-50': 'dark:bg-indigo-900/20 dark:text-indigo-400',
                'bg-amber-50': 'dark:bg-amber-900/20 dark:text-amber-400',
                'bg-emerald-50': 'dark:bg-emerald-900/20 dark:text-emerald-400',
                'bg-teal-50': 'dark:bg-teal-900/20 dark:text-teal-400',
            };
            const darkColor = darkColorMap[color] || '';

            return (
                <div onClick={onClick} className={`bg-white/70 dark:bg-slate-800/60 backdrop-blur-2xl p-4 sm:p-5 lg:p-6 rounded-3xl border border-white/60 dark:border-slate-700/50 shadow-xl shadow-slate-200/50 dark:shadow-slate-900/50 hover:shadow-2xl hover:shadow-blue-900/10 dark:hover:shadow-blue-900/20 transition-all hover:-translate-y-1 flex flex-col justify-between ${onClick ? 'cursor-pointer' : ''}`}>
                    <div className="flex flex-wrap justify-between items-start gap-2 mb-4">
                        <div className={`p-3 rounded-2xl ${color} ${darkColor}`}>{icon}</div>
                        {trendUp !== null && (
                            <div className={`flex items-center gap-1 text-[10px] sm:text-xs font-semibold px-2.5 py-1 rounded-full whitespace-nowrap ${trendUp ? 'bg-emerald-50 text-emerald-600 dark:bg-emerald-900/20 dark:text-emerald-400' : 'bg-red-50 text-red-600 dark:bg-red-900/20 dark:text-red-400'}`}>
                                <Icon name={trendUp ? 'trending-up' : 'trending-down'} size={12} /> {trend}
                            </div>
                        )}
                    </div>
                    <div>
                        <h4 className="text-slate-500 dark:text-slate-400 text-sm font-medium mb-1">{title}</h4>
                        <p className="text-2xl lg:text-3xl font-black text-slate-800 dark:text-white tracking-tight">{value}</p>
                    </div>
                </div>
            );
        }

        function StatusBadge({ status }) {
            let style = 'bg-slate-50/80 text-slate-700 border-slate-200 dark:bg-slate-800/80 dark:border-slate-600 dark:text-slate-300';
            if (status === 'Done') style = 'bg-emerald-50/80 text-emerald-700 border-emerald-200 dark:bg-emerald-900/30 dark:border-emerald-800/50 dark:text-emerald-400';
            else if (status === 'On Progress') style = 'bg-blue-50/80 text-blue-700 border-blue-200 dark:bg-blue-900/30 dark:border-blue-800/50 dark:text-blue-400';
            else if (status === 'Terlambat') style = 'bg-red-50/80 text-red-700 border-red-200 dark:bg-red-900/30 dark:border-red-800/50 dark:text-red-400';
            else if (status === 'Beresiko') style = 'bg-amber-50/80 text-amber-700 border-amber-200 dark:bg-amber-900/30 dark:border-amber-800/50 dark:text-amber-400';
            else if (status === 'Not Started') style = 'bg-slate-100/80 text-slate-600 border-slate-300 dark:bg-slate-700/50 dark:border-slate-600 dark:text-slate-400';

            return (
                <span className={`px-2.5 py-1 rounded-full text-xs font-bold border backdrop-blur-sm shadow-sm ${style} flex items-center gap-1.5 w-max`}>
                    {status === 'Done' && <Icon name="check-circle-2" size={12} />}
                    {status === 'On Progress' && <Icon name="clock" size={12} />}
                    {status === 'Terlambat' && <Icon name="alert-triangle" size={12} />}
                    {status === 'Beresiko' && <Icon name="clock" size={12} />}
                    {status === 'Not Started' && <Icon name="calendar" size={12} />}
                    {status}
                </span>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker terdaftar!', reg))
                    .catch(err => console.error('Service Worker gagal:', err));
            });
        }
    </script>
</body>

</html>
