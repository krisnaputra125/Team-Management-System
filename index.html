                                                            </td>
                                                            <td className="p-4 text-center font-medium text-slate-700">
                                                                {p.deadline ? formatDateIndo(p.deadline) : <span className="text-slate-400 italic text-xs">Belum diatur</span>}
                                                            </td>
                                                            <td className="p-4 w-48">
                                                                <div className="flex justify-between text-xs mb-1">
                                                                    <span className="font-medium text-slate-700">{p.progress}% Selesai</span>
                                                                </div>
                                                                <div className="w-full bg-slate-200 rounded-full h-2">
                                                                    <div className={`h-2 rounded-full ${p.computedStatus === 'Terlambat' ? 'bg-red-500' : p.computedStatus === 'Done' ? 'bg-emerald-500' : 'bg-blue-600'}`} style={{ width: `${p.progress}%` }}></div>
                                                                </div>
                                                            </td>
                                                            <td className="p-4">
                                                                <StatusBadge status={p.computedStatus} />
                                                            </td>
                                                        </tr>
                                                    ))
                                                )}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}

                            <div className="p-6 border-b border-slate-100">
                                <h3 className="text-lg font-bold text-slate-800">Daftar Penugasan Sub-Tim Aktif</h3>
                                <p className="text-sm text-slate-500">Menampilkan target progres dan deadline spesifik untuk Sub-Tim <strong>{empCategory}</strong> pada masing-masing proyek.</p>
                            </div>
                            <div className="p-0 overflow-x-auto min-h-[300px]">
                                <table className="w-full text-left border-collapse">
                                    <thead>
                                        <tr className="bg-slate-50 text-slate-500 text-xs uppercase tracking-wider">
                                            <th className="p-4 font-semibold">Nama Proyek</th>
                                            <th className="p-4 font-semibold">Status Proyek (Makro)</th>
                                            <th className="p-4 font-semibold">Tugas Sub-Tim ({empCategory})</th>
                                            <th className="p-4 font-semibold">Deadline Sub-Tim</th>
                                            <th className="p-4 font-semibold">Status Sub-Tim</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-100 text-sm">
                                        {assignedProjects.length === 0 ? (
                                            <tr>
                                                <td colSpan="5" className="p-8 text-center text-slate-400">
                                                    <Icon name="briefcase" size={32} className="mx-auto mb-2 opacity-50" />
                                                    <p>Belum ada proyek yang ditugaskan kepada personil ini.</p>
                                                </td>
                                            </tr>
                                        ) : (
                                            assignedProjects.map(p => {
                                                const microDetails = p.categoryDetails?.[empCategory] || {};
                                                const mProg = microDetails.progress || 0;
                                                const mDead = microDetails.deadline;
                                                const mStatus = getMicroStatus(mProg, mDead);

                                                return (
                                                    <tr key={p.id} className="hover:bg-slate-50 transition-colors">
                                                        <td className="p-4">
                                                            <p className="font-semibold text-slate-800">{p.name}</p>
                                                            <p className="text-xs text-slate-500">{p.client}</p>
                                                        </td>
                                                        <td className="p-4">
                                                            <StatusBadge status={p.computedStatus} />
                                                        </td>
                                                        <td className="p-4 w-48">
                                                            <div className="flex justify-between text-xs mb-1">
                                                                <span className="font-medium text-slate-700">{mProg}% Selesai</span>
                                                            </div>
                                                            <div className="w-full bg-slate-200 rounded-full h-2">
                                                                <div className={`h-2 rounded-full ${mStatus === 'Terlambat' ? 'bg-red-500' : mStatus === 'Done' ? 'bg-emerald-500' : 'bg-blue-600'}`} style={{ width: `${mProg}%` }}></div>
                                                            </div>
                                                        </td>
                                                        <td className="p-4 font-medium text-slate-700">
                                                            {mDead ? formatDateIndo(mDead) : <span className="text-slate-400 italic text-xs">Belum diatur</span>}
                                                        </td>
                                                        <td className="p-4">
                                                            <span className={`px-2.5 py-1 rounded-full text-xs font-bold border flex items-center gap-1 w-max ${mStatus === 'Done' ? 'bg-emerald-50 text-emerald-700 border-emerald-200' :
                                                                mStatus === 'Terlambat' ? 'bg-red-50 text-red-700 border-red-200' :
                                                                    mStatus === 'Beresiko' ? 'bg-amber-50 text-amber-700 border-amber-200' :
                                                                        mStatus === 'Belum Diatur' ? 'bg-slate-50 text-slate-500 border-slate-200' :
                                                                            'bg-blue-50 text-blue-700 border-blue-200'
                                                                }`}>
                                                                {mStatus === 'Done' && <Icon name="check-circle-2" size={12} />}
                                                                {mStatus === 'Terlambat' && <Icon name="alert-triangle" size={12} />}
                                                                {mStatus === 'Beresiko' && <Icon name="clock" size={12} />}
                                                                {mStatus === 'On Progress' && <Icon name="clock" size={12} />}
                                                                {mStatus}
                                                            </span>
                                                        </td>
                                                    </tr>
                                                )
                                            })
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                );
            };

            const renderTim = () => {
                if (viewingEmployee) return renderEmployeeDetail();

                const filteredResourcesTab = calculatedResources.filter(res =>
                    res.name.toLowerCase().includes(searchTeamTab.toLowerCase()) ||
                    res.role.toLowerCase().includes(searchTeamTab.toLowerCase()) ||
                    (res.level && res.level.toLowerCase().includes(searchTeamTab.toLowerCase()))
                );

                return (
                    <div className="space-y-6 fade-in">
                        <ErrorBanner />
                        <div className="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden flex flex-col">
                            <div className="p-6 border-b border-slate-100 flex flex-col md:flex-row md:items-center justify-between gap-4">
                                <div>
                                    <h3 className="text-lg font-bold text-slate-800">Alokasi & Beban Kerja Tim</h3>
                                    <p className="text-sm text-slate-500">Otomatis dihitung dari jumlah proyek yang mereka pegang (1 Proyek = 25% Beban).</p>
                                </div>
                                <div className="flex items-center gap-3">
                                    <div className="relative">
                                        <div className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">
                                            <Icon name="search" size={16} />
                                        </div>
                                        <input
                                            type="text"
                                            placeholder="Cari nama/Tim..."
                                            className="w-full md:w-64 pl-9 pr-4 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-500 transition-colors"
                                            value={searchTeamTab}
                                            onChange={(e) => setSearchTeamTab(e.target.value)}
                                        />
                                    </div>
                                    <button onClick={() => openModal('team', 'add')} className="flex items-center gap-2 px-4 py-2 bg-emerald-600 hover:bg-emerald-700 text-white text-sm font-medium rounded-lg transition-colors shadow-sm whitespace-nowrap">
                                        <Icon name="plus" size={16} /> Tambah
                                    </button>
                                </div>
                            </div>
                            <div className="p-0 overflow-x-auto min-h-[400px]">
                                <table className="w-full text-left border-collapse">
                                    <thead>
                                        <tr className="bg-slate-50 text-slate-500 text-xs uppercase tracking-wider">
                                            <th className="p-4 font-semibold whitespace-nowrap">Nama & Tim</th>
                                            <th className="p-4 font-semibold whitespace-nowrap text-center">Total Proyek</th>
                                            <th className="p-4 font-semibold whitespace-nowrap">Indikator Beban Kerja</th>
                                            <th className="p-4 font-semibold whitespace-nowrap text-right">Aksi</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-100 text-sm">
                                        {filteredResourcesTab.length === 0 ? (
                                            <tr>
                                                <td colSpan="4" className="p-8 text-center text-slate-400">
                                                    <Icon name="users" size={32} className="mx-auto mb-2 opacity-50" />
                                                    <p>Pencarian tidak ditemukan.</p>
                                                </td>
                                            </tr>
                                        ) : (
                                            filteredResourcesTab.map((res) => {
                                                const isOverloaded = res.workload > 100;
                                                return (
                                                    <tr key={res.id} className="hover:bg-slate-50 transition-colors group">
                                                        <td className="p-4">
                                                            <p className="font-semibold text-slate-800">{res.name}</p>
                                                            <p className="text-xs text-slate-500">{res.role}</p>
                                                            {res.level === 'Team Leader' && (
                                                                <p className="text-[10px] font-bold text-amber-600 mt-1 flex items-center gap-1"><Icon name="star" size={10} className="fill-amber-500" /> Team Leader</p>
                                                            )}
                                                        </td>
                                                        <td className="p-4 text-center"><span className="inline-block px-3 py-1 bg-slate-100 text-slate-700 rounded-full text-xs font-semibold whitespace-nowrap">{res.projects} Proyek Aktif</span></td>
                                                        <td className="p-4 w-64">
                                                            <div className="flex justify-between items-end mb-1">
                                                                <span className={`text-xs font-bold ${isOverloaded ? 'text-red-600' : 'text-blue-600'}`}>{res.workload}% Kapasitas Terpakai</span>
                                                            </div>
                                                            <div className="w-full bg-slate-100 rounded-full h-2.5 flex overflow-hidden">
                                                                <div className={`h-full ${isOverloaded ? 'bg-red-500' : 'bg-blue-500'}`} style={{ width: `${Math.min(res.workload, 100)}%` }}></div>
                                                                {isOverloaded && (<div className="h-full bg-red-800" style={{ width: `${res.workload - 100}%` }}></div>)}
                                                            </div>
                                                            {isOverloaded && <p className="text-[10px] text-red-500 mt-1 font-medium">Beban melampaui batas wajar</p>}
                                                        </td>
                                                        <td className="p-4 text-right">
                                                            <div className="flex justify-end gap-2 items-center">
                                                                {/* TOMBOL DETAIL BARU */}
                                                                <button onClick={() => setViewingEmployee(res)} className="px-2 py-1.5 text-xs font-semibold bg-indigo-50 text-indigo-600 hover:bg-indigo-100 rounded-lg flex items-center gap-1.5 border border-indigo-200 transition-colors">
                                                                    <Icon name="folder-open" size={14} /> Rincian
                                                                </button>
                                                                <div className="lg:opacity-0 lg:group-hover:opacity-100 transition-opacity flex gap-2">
                                                                    <button onClick={() => openModal('team', 'edit', res)} className="p-1.5 text-blue-600 hover:bg-blue-50 rounded"><Icon name="edit" size={16} /></button>
                                                                    <button onClick={() => handleDelete('team', res.id)} className="p-1.5 text-red-600 hover:bg-red-50 rounded"><Icon name="trash" size={16} /></button>
                                                                </div>
                                                            </div>
                                                        </td>
                                                    </tr>
                                                );
                                            })
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                );
            };

            // --- KOMPONEN TAB: TIMESHEET ---
            const renderTimesheet = () => (
                <div className="flex flex-col items-center justify-center h-[60vh] text-center fade-in">
                    <div className="w-20 h-20 bg-indigo-50 text-indigo-600 rounded-full flex items-center justify-center mb-4">
                        <Icon name="calendar-clock" size={40} />
                    </div>
                    <h2 className="text-2xl font-bold text-slate-800 mb-2">Modul Timesheet</h2>
                    <p className="text-slate-500 max-w-md">Modul pengisian log harian karyawan sedang dalam tahap pengembangan dan akan segera dirilis pada pembaruan sistem berikutnya.</p>
                </div>
            );

            // --- MODAL FORMULAR ---
            const ModalForm = () => {
                if (!modalConfig.isOpen) return null;

                const isProject = modalConfig.type === 'project';

                const [formData, setFormData] = useState(
                    modalConfig.data 
                        ? { ...modalConfig.data, adjustmentInput: 0 } 
                        : (isProject
                            ? { name: '', client: '', type: 'Perencanaan', status: 'On Progress', progress: 0, deadline: '', description: '', descriptionUpdatedAt: '', team: [], categoryDetails: {}, teamLeader: '' }
                            : { name: '', role: 'Arsitek', level: 'Staff', rating: 3, manualPoints: 0, adjustmentInput: 0 }
                        )
                );

                const [searchTeam, setSearchTeam] = useState("");

                const handleChange = (e) => {
                    const { name, value } = e.target;
                    setFormData({ ...formData, [name]: value });
                };

                // Handler khusus untuk detail kategori
                const handleCategoryDetailChange = (category, field, value) => {
                    setFormData(prev => ({
                        ...prev,
                        categoryDetails: {
                            ...prev.categoryDetails,
                            [category]: {
                                ...(prev.categoryDetails?.[category] || {}),
                                [field]: value
                            }
                        }
                    }));
                };

                // Dapatkan Kategori Aktif untuk menampilkan form progres spesifik tim & menghitung rata-rata
                const activeCategories = Array.from(new Set((formData.team || []).map(memberName => {
                    const res = resources.find(r => r.name === memberName);
                    return res ? getCategoryFromRole(res.role) : 'Lainnya';
                })));

                // HITUNG PROGRESS TOTAL OTOMATIS BERDASARKAN RATA-RATA SUB-TIM
                const computedTotalProgress = useMemo(() => {
                    if (!isProject || activeCategories.length === 0) return 0;
                    let total = 0;
                    activeCategories.forEach(cat => {
                        total += parseInt(formData.categoryDetails?.[cat]?.progress) || 0;
                    });
                    return Math.round(total / activeCategories.length);
                }, [formData.categoryDetails, activeCategories, isProject]);

                const handleResetTo100 = () => {
                    const dummyEmp = { ...formData };
                    let calculated = null;
                    if (formData.level === 'Team Leader') {
                        calculated = calculateLeaderKPI(dummyEmp, computedProjects);
                    } else {
                        calculated = calculateEmployeeKPI(dummyEmp, computedProjects);
                    }
                    const gap = 100 - calculated.score;
                    setFormData(prev => ({ ...prev, adjustmentInput: gap }));
                };

                const handleResetToAuto = () => {
                    const gap = -(formData.manualPoints || 0);
                    setFormData(prev => ({ ...prev, adjustmentInput: gap }));
                };


                const handleSubmit = (e) => {
                    e.preventDefault();
                    let finalPayload = { ...formData };
                    if (isProject) {
                        // OTOMATISASI PROGRESS PROJECT (TIDAK LAGI MANUAL)
                        finalPayload.progress = computedTotalProgress;

                        // Otomatisasi Timestamp Deskripsi: Hanya update waktu jika deskripsi berubah
                        const oldDesc = modalConfig.data ? modalConfig.data.description : '';
                        if (finalPayload.description && finalPayload.description !== oldDesc) {
                            finalPayload.descriptionUpdatedAt = new Date().toISOString();
                        } else if (!finalPayload.description) {
                            finalPayload.descriptionUpdatedAt = '';
                        } else {
                            finalPayload.descriptionUpdatedAt = modalConfig.data ? modalConfig.data.descriptionUpdatedAt : '';
                        }

                        // Bersihkan kategori detail jika member dari kategori tersebut sudah dihapus
                        const activeCats = new Set((finalPayload.team || []).map(memberName => {
                            const res = resources.find(r => r.name === memberName);
                            return res ? getCategoryFromRole(res.role) : 'Lainnya';
                        }));

                        const cleanDetails = {};
                        activeCats.forEach(cat => {
                            if (finalPayload.categoryDetails && finalPayload.categoryDetails[cat]) {
                                cleanDetails[cat] = finalPayload.categoryDetails[cat];
                            }
                        });

                        const teamDataObj = {
                            members: finalPayload.team || [],
                            details: cleanDetails,
                            leader: finalPayload.teamLeader || ""
                        };

                        // Enkripsi ke string agar aman masuk backend lama
                        finalPayload.team = JSON.stringify(teamDataObj).replace(/;/g, ',');
                    } else {
                        // Gabungkan role, level, dan manualPoints untuk personil
                        const newManualPoints = (finalPayload.manualPoints || 0) + (finalPayload.adjustmentInput || 0);
                        finalPayload.role = `${finalPayload.role}|${finalPayload.level}|${newManualPoints}`;
                    }
                    handleCrudAction(modalConfig.mode, modalConfig.type, finalPayload);
                };

                const filteredResources = resources.filter(res =>
                    res.name.toLowerCase().includes(searchTeam.toLowerCase()) ||
                    res.role.toLowerCase().includes(searchTeam.toLowerCase())
                );

                return (
                    <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-end sm:items-center justify-center sm:p-4 fade-in">
                        <div className="bg-white rounded-t-2xl sm:rounded-2xl shadow-xl w-full sm:max-w-2xl overflow-hidden flex flex-col max-h-[90vh] sm:max-h-[95vh]">
                            <div className="p-5 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                                <h3 className="font-bold text-lg text-slate-800">
                                    {modalConfig.mode === 'add' ? 'Tambah ' : 'Edit '}
                                    {isProject ? 'Data Proyek Terpadu' : 'Data Personil'}
                                </h3>
                                <button onClick={closeModal} className="text-slate-400 hover:text-red-500 transition-colors"><Icon name="x" size={20} /></button>
                            </div>

                            <div className="p-6 overflow-y-auto">
                                <form id="crudForm" onSubmit={handleSubmit} className="space-y-5">
                                    {isProject ? (
                                        <>
                                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                                <div className="col-span-2 md:col-span-1">
                                                    <label className="block text-xs font-semibold text-slate-600 mb-1">Nama Proyek</label>
                                                    <input required name="name" value={formData.name} onChange={handleChange} className="w-full p-2.5 border border-slate-200 rounded-lg text-sm outline-none focus:border-blue-500 bg-slate-50 focus:bg-white transition-colors" placeholder="Cth: Perencanaan RSUD" />
                                                </div>
                                                <div className="col-span-2 md:col-span-1">
                                                    <label className="block text-xs font-semibold text-slate-600 mb-1">Klien / Owner</label>
                                                    <input required name="client" value={formData.client} onChange={handleChange} className="w-full p-2.5 border border-slate-200 rounded-lg text-sm outline-none focus:border-blue-500 bg-slate-50 focus:bg-white transition-colors" placeholder="Cth: Dinas PUPR" />
                                                </div>
                                            </div>

                                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                                <div>
                                                    <label className="block text-xs font-semibold text-slate-600 mb-1">Tipe Proyek</label>
                                                    <select name="type" value={formData.type} onChange={handleChange} className="w-full p-2.5 border border-slate-200 rounded-lg text-sm outline-none focus:border-blue-500 bg-slate-50 focus:bg-white">
                                                        <option value="Perencanaan">Perencanaan</option><option value="Pengawasan">Pengawasan</option><option value="Manajemen Konstruksi">Manajemen Konstruksi</option>
                                                    </select>
                                                </div>
                                                <div>
                                                    <label className="block text-xs font-semibold text-slate-600 mb-1">Status Proyek (Makro)</label>
                                                    <select name="status" value={formData.status} onChange={handleChange} className="w-full p-2.5 border border-slate-200 rounded-lg text-sm outline-none focus:border-blue-500 bg-slate-50 focus:bg-white">
                                                        <option value="On Progress">On Progress</option>
                                                        <option value="Done">Done</option>
                                                    </select>
                                                </div>
                                            </div>

                                            <div>
                                                <label className="block text-xs font-semibold text-slate-600 mb-1 flex items-center gap-1"><Icon name="file-text" size={12} /> Deskripsi / Update Proyek</label>
                                                <textarea name="description" value={formData.description || ''} onChange={handleChange} rows="3" className="w-full p-2.5 border border-slate-200 rounded-lg text-sm outline-none focus:border-blue-500 bg-slate-50 focus:bg-white transition-colors resize-none" placeholder="Tuliskan update terkini proyek ini... Cth: Sudah masuk tahap DED, menunggu approval dari klien untuk revisi arsitektur." />
                                            </div>

                                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 bg-slate-100 p-3 rounded-lg border border-slate-200">
                                                <div>
                                                    <label className="block text-[11px] font-bold text-slate-700 mb-1">Progress Keseluruhan Proyek (%)</label>
                                                    <input
                                                        type="number"
                                                        readOnly
                                                        value={computedTotalProgress}
                                                        className="block w-full p-2.5 border border-slate-200 bg-slate-200 text-slate-600 font-bold rounded-lg text-sm outline-none cursor-not-allowed appearance-none m-0"
                                                        title="Nilai ini dihitung otomatis"
                                                    />
                                                    <p className="text-[9px] text-slate-500 mt-1">Dihitung otomatis dari rata-rata progress sub-tim.</p>
                                                </div>
                                                <div>
                                                    <label className="block text-[11px] font-bold text-slate-700 mb-1">Tenggat Waktu Kontrak Akhir</label>
                                                    <input type="date" name="deadline" value={formData.deadline} onChange={handleChange} className="block w-full p-2.5 border border-slate-200 bg-white rounded-lg text-sm outline-none focus:border-blue-500 appearance-none m-0 min-h-[42px]" />
                                                </div>
                                            </div>

                                            {/* BAGIAN PENUGASAN TIM */}
                                            <div className="pt-2 border-t border-slate-200">
                                                <label className="block text-sm font-bold text-slate-800 mb-2">Penugasan Personil</label>

                                                <div className="mb-4 bg-amber-50 p-3 rounded-lg border border-amber-200 shadow-sm">
                                                    <label className="block text-xs font-bold text-amber-800 mb-1 flex items-center gap-1.5"><Icon name="star" size={14} className="text-amber-500" /> Pilih Team Leader Proyek</label>
                                                    <select name="teamLeader" value={formData.teamLeader || ""} onChange={handleChange} className="w-full p-2.5 border border-amber-200 rounded-lg text-sm outline-none focus:border-amber-500 bg-white shadow-sm font-semibold text-slate-700">
                                                        <option value="">-- Tidak Ada Team Leader --</option>
                                                        {resources.filter(r => r.level === 'Team Leader').map(r => (
                                                            <option key={r.id} value={r.name}>{r.name} ({r.role})</option>
                                                        ))}
                                                    </select>
                                                </div>

                                                <label className="block text-xs font-bold text-slate-700 mb-1">Anggota Sub-Tim</label>

                                                <div className="relative mb-3">
                                                    <div className="absolute left-2.5 top-1/2 -translate-y-1/2 text-slate-400">
                                                        <Icon name="search" size={14} />
                                                    </div>
                                                    <input
                                                        type="text"
                                                        placeholder="Cari nama personil untuk ditugaskan..."
                                                        className="w-full pl-8 pr-3 py-2 bg-white border border-slate-300 rounded-md text-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition-all shadow-sm"
                                                        value={searchTeam}
                                                        onChange={(e) => setSearchTeam(e.target.value)}
                                                    />
                                                </div>

                                                <div className="border border-slate-200 rounded-lg bg-slate-50 p-3 max-h-48 overflow-y-auto">
                                                    {resources.length === 0 ? (
                                                        <p className="text-xs text-slate-400 italic">Belum ada data tim. Tambahkan di menu Alokasi Tim.</p>
                                                    ) : filteredResources.length === 0 ? (
                                                        <p className="text-xs text-slate-400 italic">Pencarian tidak ditemukan.</p>
                                                    ) : (
                                                        <>
                                                            <TeamCheckboxGroup title="Tim Arsitek" roleFilter={r => r.role.toLowerCase().includes('arsitek')} isOptional={false} filteredResources={filteredResources} formData={formData} setFormData={setFormData} />
                                                            <TeamCheckboxGroup title="Tim Quantity Surveyor (QS)" roleFilter={r => r.role.toLowerCase() === 'qs' || r.role.toLowerCase().includes('quantity')} isOptional={false} filteredResources={filteredResources} formData={formData} setFormData={setFormData} />
                                                            <TeamCheckboxGroup title="Tim Struktur" roleFilter={r => r.role.toLowerCase().includes('struktur')} isOptional={true} filteredResources={filteredResources} formData={formData} setFormData={setFormData} />
                                                            <TeamCheckboxGroup title="Tim MEP" roleFilter={r => r.role.toLowerCase().includes('mep')} isOptional={true} filteredResources={filteredResources} formData={formData} setFormData={setFormData} />
                                                            <TeamCheckboxGroup title="Tim Tata Ruang" roleFilter={r => r.role.toLowerCase().includes('tata ruang') || r.role.toLowerCase().includes('planologi')} isOptional={true} filteredResources={filteredResources} formData={formData} setFormData={setFormData} />
                                                            <TeamCheckboxGroup title="Lainnya" roleFilter={r => !r.role.toLowerCase().includes('arsitek') && !(r.role.toLowerCase() === 'qs' || r.role.toLowerCase().includes('quantity')) && !r.role.toLowerCase().includes('struktur') && !r.role.toLowerCase().includes('mep') && !(r.role.toLowerCase().includes('tata ruang') || r.role.toLowerCase().includes('planologi'))} isOptional={true} filteredResources={filteredResources} formData={formData} setFormData={setFormData} />
                                                        </>
                                                    )}
                                                </div>
                                            </div>

                                            {/* BAGIAN TARGET MICRO PER SUB-TIM */}
                                            {activeCategories.length > 0 && (
                                                <div className="pt-4 border-t border-slate-100">
                                                    <label className="flex items-center gap-1.5 text-sm font-bold text-slate-800 mb-3"><Icon name="target" size={16} className="text-blue-600" /> Target Khusus Per Sub-Tim</label>
                                                    <div className="space-y-2 border border-slate-200 rounded-lg p-3 bg-blue-50/30">
                                                        {['Arsitek', 'QS', 'Struktur', 'MEP', 'Tata Ruang', 'Lainnya'].map(cat => {
                                                            if (!activeCategories.includes(cat)) return null;

                                                            const details = formData.categoryDetails?.[cat] || { progress: 0, deadline: '' };

                                                            return (
                                                                <div key={cat} className="bg-white border border-slate-200 p-2.5 rounded-lg flex flex-col sm:flex-row sm:items-center gap-2 sm:gap-4 shadow-sm">
                                                                    <div className="w-full sm:w-1/3 sm:border-r border-slate-100 sm:pr-2">
                                                                        <h4 className="text-xs font-bold text-slate-700">{cat}</h4>
                                                                        <p className="text-[9px] text-slate-500 truncate mt-0.5" title={formData.team.filter(m => { const r = resources.find(x => x.name === m); return r && getCategoryFromRole(r.role) === cat; }).join(', ')}>
                                                                            {formData.team.filter(m => {
                                                                                const r = resources.find(x => x.name === m);
                                                                                return r && getCategoryFromRole(r.role) === cat;
                                                                            }).join(', ')}
                                                                        </p>
                                                                    </div>
                                                                    <div className="w-1/3">
                                                                        <label className="block text-[9px] font-bold text-slate-500 mb-1 uppercase">Progress Tim (%)</label>
                                                                        <input type="number" min="0" max="100" className="block w-full p-2 border border-slate-200 rounded-md text-xs outline-none focus:border-blue-500 bg-slate-50 focus:bg-white transition-colors appearance-none m-0"
                                                                            value={details.progress !== undefined ? details.progress : 0}
                                                                            onChange={(e) => handleCategoryDetailChange(cat, 'progress', e.target.value)}
                                                                        />
                                                                    </div>
                                                                    <div className="w-full sm:w-1/3">
                                                                        <label className="block text-[9px] font-bold text-slate-500 mb-1 uppercase">Deadline Tim</label>
                                                                        <input type="date" className="block w-full p-2 border border-slate-200 rounded-md text-xs outline-none focus:border-blue-500 bg-slate-50 focus:bg-white transition-colors appearance-none m-0 min-h-[34px]"
                                                                            value={details.deadline || ''}
                                                                            onChange={(e) => handleCategoryDetailChange(cat, 'deadline', e.target.value)}
                                                                        />
                                                                    </div>
                                                                </div>
                                                            )
                                                        })}
                                                    </div>
                                                </div>
                                            )}
                                        </>
                                    ) : (
                                        <>
                                            <div><label className="block text-xs font-semibold text-slate-600 mb-1">Nama Personil</label><input required name="name" value={formData.name} onChange={handleChange} className="w-full p-2.5 border border-slate-200 rounded-lg text-sm outline-none focus:border-blue-500" placeholder="Cth: Ir. Budi Santoso" /></div>
                                            <div>
                                                <label className="block text-xs font-semibold text-slate-600 mb-1">Tim</label>
                                                <select name="role" value={formData.role} onChange={handleChange} className="w-full p-2.5 border border-slate-200 rounded-lg text-sm outline-none focus:border-blue-500">
                                                    <option value="Arsitek">Arsitek</option>
                                                    <option value="QS">Quantity Surveyor (QS)</option>
                                                    <option value="Struktur">Struktur</option>
                                                    <option value="MEP">MEP</option>
                                                    <option value="Tata Ruang">Tata Ruang</option>
                                                    <option value="Lainnya">Lainnya</option>
                                                </select>
                                            </div>
                                            <div>
                                                <label className="block text-xs font-semibold text-slate-600 mb-1">Tingkat Jabatan</label>
                                                <select name="level" value={formData.level} onChange={handleChange} className="w-full p-2.5 border border-slate-200 rounded-lg text-sm outline-none focus:border-blue-500 bg-white">
                                                    <option value="Staff">Staff (Anggota)</option>
                                                    <option value="Team Leader">Team Leader</option>
                                                </select>
                                            </div>
                                            <div>
                                                <label className="block text-xs font-semibold text-slate-600 mb-1">Rating Kinerja (1-5)</label>
                                                <div className="flex gap-2 items-center p-1">
                                                    {[1, 2, 3, 4, 5].map(star => (
                                                        <button
                                                            key={star}
                                                            type="button"
                                                            onClick={() => setFormData({ ...formData, rating: star })}
                                                            className={`transition-colors focus:outline-none ${star <= (formData.rating || 3) ? 'text-amber-500' : 'text-slate-200'}`}
                                                        >
                                                            <Icon name="star" size={28} />
                                                        </button>
                                                    ))}
                                                    <span className="text-xs text-slate-500 ml-2 font-medium">Bintang {formData.rating || 3}</span>
                                                </div>
                                            </div>
                                            
                                            <div className="p-4 bg-slate-50 border border-slate-200 rounded-lg space-y-3">
                                                <div>
                                                    <label className="block text-xs font-bold text-slate-700 mb-1">Tambah / Kurang Skor KPI (+/-)</label>
                                                    <p className="text-[10px] text-slate-500 mb-2 leading-relaxed">Nilai ini akan langsung ditambahkan secara relatif ke skor terakhir. Contoh: Jika skor 60 dan Anda isi 40, skor menjadi 100.</p>
                                                    <div className="flex flex-wrap gap-3 items-center mt-2">
                                                        <input 
                                                            type="number" 
                                                            name="adjustmentInput" 
                                                            value={formData.adjustmentInput === '' || isNaN(formData.adjustmentInput) ? '' : (formData.adjustmentInput !== undefined ? formData.adjustmentInput : 0)} 
                                                            onChange={(e) => setFormData({ ...formData, adjustmentInput: e.target.value === '' ? '' : parseInt(e.target.value) })} 
                                                            className="w-24 p-2 border border-slate-300 rounded-lg text-sm text-center outline-none focus:border-blue-500 bg-white" 
                                                        />
                                                        <button 
                                                            type="button"
                                                            onClick={handleResetTo100}
                                                            className="px-3 py-2 bg-blue-100 hover:bg-blue-200 text-blue-700 border border-blue-200 text-xs font-bold rounded-lg transition-colors flex items-center gap-1"
                                                        >
                                                            <Icon name="target" size={12} />
                                                            Reset ke 100
                                                        </button>
                                                        <button 
                                                            type="button"
                                                            onClick={handleResetToAuto}
                                                            className="px-3 py-2 bg-slate-200 hover:bg-slate-300 text-slate-700 border border-slate-300 text-xs font-bold rounded-lg transition-colors flex items-center gap-1"
                                                            title="Hapus semua penyesuaian manual dan kembalikan ke perhitungan murni otomatis proyek."
                                                        >
                                                            <Icon name="refresh-ccw" size={12} />
                                                            Hapus Manual
                                                        </button>
                                                    </div>
                                                </div>
                                            </div>
                                            <div className="p-3 bg-blue-50 border border-blue-100 rounded-lg mt-4">
                                                <p className="text-xs text-blue-800 font-medium leading-relaxed">
                                                    💡 <strong className="font-bold">Info Cerdas:</strong> Jumlah proyek dan Persentase Beban Kerja orang ini tidak perlu diinput manual. Sistem akan otomatis menghitungnya berdasarkan seberapa banyak proyek yang ia tangani di menu List Proyek.
                                                </p>
                                            </div>
                                        </>
                                    )}
                                </form>
                            </div>

                            <div className="p-5 border-t border-slate-100 flex justify-end gap-3 bg-slate-50">
                                <button onClick={closeModal} type="button" className="px-4 py-2 text-sm font-medium text-slate-600 hover:bg-slate-200 rounded-lg transition-colors">Batal</button>
                                <button form="crudForm" type="submit" disabled={loading} className="flex items-center gap-2 px-6 py-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium rounded-lg transition-colors shadow-sm disabled:opacity-70">
                                    {loading ? <Icon name="refresh-ccw" className="animate-spin" size={16} /> : <Icon name="save" size={16} />}
                                    Simpan
                                </button>
                            </div>
                        </div>
                    </div>
                );
            };

            return (
                <div className="flex h-screen text-slate-800">
                    {sidebarOpen && <div className="fixed inset-0 bg-black/50 backdrop-blur-sm z-40 lg:hidden" onClick={() => setSidebarOpen(false)} />}
                    <aside className={`fixed lg:relative z-50 lg:z-auto w-64 bg-slate-900 text-slate-300 flex flex-col shrink-0 h-full top-0 left-0 transition-transform duration-300 ease-in-out ${sidebarOpen ? 'translate-x-0' : '-translate-x-full'} lg:translate-x-0`}>
                        <div className="p-4 lg:p-6">
                            <div className="flex items-center justify-between mb-2">
                                <div className="flex items-center gap-3 text-white">
                                    <div className="w-8 h-8 shrink-0 rounded-lg bg-blue-600 flex items-center justify-center font-bold text-lg shadow-lg shadow-blue-600/30">TM</div>
                                    <h1 className="text-base font-bold tracking-wide leading-tight">Team Management System</h1>
                                </div>
                                <button onClick={() => setSidebarOpen(false)} className="lg:hidden text-slate-400 hover:text-white p-1.5 rounded-lg hover:bg-slate-800 transition-colors">
                                    <Icon name="x" size={20} />
                                </button>
                            </div>
                            <p className="text-xs text-slate-500 uppercase tracking-wider font-semibold">Yang Teknis - Teknis Aja</p>
                        </div>
                        <nav className="flex-1 px-4 space-y-2 mt-4">
                            <SidebarItem icon={<Icon name="layout-dashboard" size={20} />} label="Dashboard" isActive={activeTab === 'dashboard'} onClick={() => handleTabChange('dashboard')} />
                            <SidebarItem icon={<Icon name="briefcase" size={20} />} label="List Proyek" isActive={activeTab === 'proyek'} onClick={() => handleTabChange('proyek')} />
                            <SidebarItem icon={<Icon name="users" size={20} />} label="Alokasi Tim" isActive={activeTab === 'tim'} onClick={() => handleTabChange('tim')} />
                            <SidebarItem icon={<Icon name="bar-chart" size={20} />} label="Evaluasi & KPI (BETA)" isActive={activeTab === 'kpi'} onClick={() => handleTabChange('kpi')} />
                        </nav>
                    </aside>

                    <main className="flex-1 flex flex-col overflow-hidden bg-slate-50 relative min-w-0">
                        <header className="h-14 sm:h-16 lg:h-20 bg-white border-b border-slate-200 flex items-center justify-between px-3 sm:px-5 lg:px-8 z-10 shrink-0 gap-2">
                            <div className="flex items-center gap-2 sm:gap-3 min-w-0">
                                <button onClick={() => setSidebarOpen(true)} className="lg:hidden p-2 -ml-1 rounded-lg text-slate-600 hover:bg-slate-100 shrink-0 transition-colors" aria-label="Buka menu">
                                    <Icon name="menu" size={22} />
                                </button>
                                <div className="min-w-0">
                                    <h2 className="text-sm sm:text-base lg:text-xl font-bold text-slate-800 truncate">
                                        {activeTab === 'dashboard' && 'Ringkasan Proyek & Personil'}
                                        {activeTab === 'proyek' && 'List Proyek'}
                                        {activeTab === 'tim' && 'Alokasi Tim'}
                                        {activeTab === 'kpi' && 'Evaluasi & KPI Tim'}
                                    </h2>
                                    <p className="text-[10px] sm:text-xs text-slate-500 mt-0.5 hidden sm:block">Sistem Yang Teknis Teknis Aja</p>
                                </div>
                            </div>
                            <div className="flex items-center gap-2 sm:gap-4 shrink-0">
                                <div className={`hidden sm:flex items-center gap-2 px-2 sm:px-3 py-1 sm:py-1.5 rounded-full text-xs font-semibold shadow-sm ${isLive ? 'bg-emerald-100 text-emerald-700 border border-emerald-200' : 'bg-amber-100 text-amber-700 border border-amber-200'}`}>
                                    <Icon name="database" size={14} /> {isLive ? 'Live' : 'Offline'}
                                </div>
                                <div className={`sm:hidden w-2.5 h-2.5 rounded-full shrink-0 ${isLive ? 'bg-emerald-500' : 'bg-amber-500'}`} title={isLive ? 'Connected' : 'Offline'} />
                                <button onClick={fetchFromGoogleSheets} disabled={loading || !GOOGLE_SCRIPT_URL} className={`p-2 rounded-full transition-all shrink-0 ${loading ? 'animate-spin text-blue-500' : 'text-slate-400 hover:text-blue-600 hover:bg-blue-50'}`} title="Refresh Database">
                                    <Icon name="refresh-ccw" size={20} />
                                </button>
                            </div>
                        </header>

                        <div className="flex-1 overflow-auto p-3 sm:p-5 lg:p-8 relative">
                            {loading && (
                                <div className="absolute inset-0 bg-white/60 backdrop-blur-sm z-40 flex flex-col items-center justify-center rounded-xl">
                                    <div className="animate-spin text-blue-600 mb-4"><Icon name="refresh-ccw" size={32} /></div>
                                    <p className="font-semibold text-slate-700">Sinkronisasi Database...</p>
                                </div>
                            )}

                            <div className="max-w-7xl mx-auto">
                                {activeTab === 'dashboard' && renderDashboard()}
                                {activeTab === 'proyek' && renderProyek()}
                                {activeTab === 'tim' && renderTim()}
                                {activeTab === 'timesheet' && renderTimesheet()}
                                {activeTab === 'kpi' && renderKPI()}
                            </div>
                        </div>
                    </main>

                    <ModalForm />
                </div>
            );
        }

        // --- SUB-COMPONENTS ---
        function SidebarItem({ icon, label, isActive, onClick }) {
            return (
                <button onClick={onClick} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 ${isActive ? 'bg-blue-600 text-white shadow-md shadow-blue-900/20' : 'text-slate-400 hover:bg-slate-800 hover:text-slate-200'}`}>
                    {icon} <span className="font-medium text-sm">{label}</span>
                </button>
            );
        }

        function MetricCard({ title, value, trend, trendUp, icon, color }) {
            return (
                <div className="bg-white p-3 sm:p-4 lg:p-6 rounded-xl sm:rounded-2xl border border-slate-200 shadow-sm flex flex-col justify-between">
                    <div className="flex justify-between items-start mb-4">
                        <div className={`p-3 rounded-xl ${color}`}>{icon}</div>
                        {trendUp !== null && (
                            <div className={`flex items-center gap-1 text-xs font-semibold px-2 py-1 rounded-full ${trendUp ? 'bg-emerald-50 text-emerald-600' : 'bg-red-50 text-red-600'}`}>
                                <Icon name={trendUp ? 'trending-up' : 'trending-down'} size={12} /> {trend}
                            </div>
                        )}
                    </div>
                    <div>
                        <h4 className="text-slate-500 text-sm font-medium mb-1">{title}</h4>
                        <p className="text-2xl lg:text-3xl font-bold text-slate-800">{value}</p>
                    </div>
                </div>
            );
        }

        function StatusBadge({ status }) {
            let style = 'bg-slate-50 text-slate-700 border-slate-200';
            if (status === 'Done') style = 'bg-emerald-50 text-emerald-700 border-emerald-200';
            else if (status === 'On Progress') style = 'bg-blue-50 text-blue-700 border-blue-200';
            else if (status === 'Terlambat') style = 'bg-red-50 text-red-700 border-red-200';
            else if (status === 'Beresiko') style = 'bg-amber-50 text-amber-700 border-amber-200';

            return (
                <span className={`px-2.5 py-1 rounded-full text-xs font-semibold border ${style} flex items-center gap-1.5 w-max`}>
                    {status === 'Done' && <Icon name="check-circle-2" size={12} />}
                    {status === 'On Progress' && <Icon name="clock" size={12} />}
                    {status === 'Terlambat' && <Icon name="alert-triangle" size={12} />}
                    {status === 'Beresiko' && <Icon name="clock" size={12} />}
                    {status}
                </span>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
